    <!-- Redefine window.fetch to support writing/setting, neutralizing any sandboxed iframe override crashes -->
    <script>
      (function() {
        var originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          configurable: true,
          enumerable: true,
          get: function() {
            return originalFetch;
          },
          set: function(val) {
            originalFetch = val;
          }
        });
